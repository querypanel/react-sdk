name: Node SDK - Test and Publish

on:
  pull_request:
    paths:
      - 'node-sdk/**'
      - '.github/workflows/node-sdk.yml'
  push:
    branches: [ main ]
    paths:
      - 'node-sdk/**'
      - '.github/workflows/node-sdk.yml'
    tags:
      - 'node-sdk-v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Semver bump type'
        required: true
        type: choice
        options: [ patch, minor, major ]

jobs:
  test:
    name: Test node-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: node-sdk/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  publish:
    name: Publish to npm (node-sdk)
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/node-sdk-v')
    defaults:
      run:
        working-directory: node-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: node-sdk/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Set version from tag (tag push)
        if: startsWith(github.ref, 'refs/tags/node-sdk-v')
        run: |
          TAG="${GITHUB_REF#refs/tags/node-sdk-v}"
          echo "TAG_VERSION=$TAG" >> $GITHUB_ENV
          npm version "$TAG" --no-git-tag-version
      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "TAG_VERSION=$NEW_VERSION" >> $GITHUB_ENV
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public


